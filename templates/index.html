<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Web Phone OS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: #121212; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        
        /* Phone Container */
        .phone {
            width: 375px;
            height: 812px;
            background: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop') no-repeat center center/cover;
            border-radius: 40px;
            border: 8px solid #2c2c2c;
            position: relative;
            box-shadow: 0 0 50px rgba(138, 43, 226, 0.3); /* Purple neon glow */
            overflow: hidden;
        }

        /* Notch */
        .notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 30px;
            background-color: #000;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            z-index: 10;
        }

        /* App Grid */
        .home-screen {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px 15px;
            padding: 60px 20px 20px 20px;
            height: calc(100% - 100px);
            align-content: start;
        }

        .app-icon {
            width: 60px;
            height: 60px;
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 12px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            flex-direction: column;
        }
        .app-icon img { width: 40px; height: 40px; margin-bottom: 5px; border-radius: 10px;}
        
        /* App Window */
        .app-window {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #1e1e1e;
            z-index: 20;
            display: none;
            flex-direction: column;
        }
        .app-header {
            padding: 40px 20px 10px 20px;
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(10px);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
        }
        .close-btn { color: #0a84ff; cursor: pointer; font-weight: bold; }
        
        iframe { flex-grow: 1; border: none; width: 100%; background: white;}
        
        /* Fake Dialer */
        .dialer { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: white;}
        .dial-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 50px; }
        .dial-btn { width: 70px; height: 70px; border-radius: 50%; background: #333; display: flex; justify-content: center; align-items: center; font-size: 24px; cursor: pointer;}
        .call-btn { background: #34c759; margin-top: 30px; }

        /* Dock */
        .dock {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            height: 80px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 10px;
        }
    </style>
</head>
<body>

<div class="phone">
    <div class="notch"></div>
    
    <div class="home-screen" id="homeScreen">
        <div class="app-icon" onclick="openApp('appstore')">
            <img src="https://img.icons8.com/color/96/000000/mac-os--v1.png" alt="App Store">
            Store
        </div>
    </div>

    <div class="dock">
        <div class="app-icon" onclick="openDialer()">
            <img src="https://img.icons8.com/color/96/000000/phone.png" alt="Phone">
        </div>
        <div class="app-icon" onclick="openApp('safari')">
            <img src="https://img.icons8.com/color/96/000000/safari--v1.png" alt="Safari">
        </div>
        <div class="app-icon" onclick="openApp('youtube')">
            <img src="https://img.icons8.com/color/96/000000/youtube-play.png" alt="YouTube">
        </div>
    </div>

    <div class="app-window" id="appWindow">
        <div class="app-header">
            <div class="close-btn" onclick="closeApp()">Back</div>
            <div id="appTitle">App</div>
            <div></div>
        </div>
        <iframe id="appFrame" src=""></iframe>
        
        <div class="dialer" id="dialerUI">
            <h1 id="dialerDisplay"></h1>
            <div class="dial-pad">
                <div class="dial-btn" onclick="addNumber(1)">1</div>
                <div class="dial-btn" onclick="addNumber(2)">2</div>
                <div class="dial-btn" onclick="addNumber(3)">3</div>
                <div class="dial-btn" onclick="addNumber(4)">4</div>
                <div class="dial-btn" onclick="addNumber(5)">5</div>
                <div class="dial-btn" onclick="addNumber(6)">6</div>
                <div class="dial-btn" onclick="addNumber(7)">7</div>
                <div class="dial-btn" onclick="addNumber(8)">8</div>
                <div class="dial-btn" onclick="addNumber(9)">9</div>
                <div class="dial-btn" onclick="addNumber('*')">*</div>
                <div class="dial-btn" onclick="addNumber(0)">0</div>
                <div class="dial-btn" onclick="addNumber('#')">#</div>
            </div>
            <div class="dial-btn call-btn" onclick="alert('SIM required for real calls. Connect API.')">📞</div>
        </div>
    </div>
</div>

<script>
    function openApp(appType) {
        document.getElementById('appWindow').style.display = 'flex';
        document.getElementById('dialerUI').style.display = 'none';
        document.getElementById('appFrame').style.display = 'block';
        
        let frame = document.getElementById('appFrame');
        let title = document.getElementById('appTitle');

        if(appType === 'safari') {
            frame.src = 'https://www.bing.com'; // Google strictly blocks iframes, Bing allows it for search demo.
            title.innerText = 'Browser';
        } else if(appType === 'youtube') {
            frame.src = 'https://m.youtube.com'; // Many YT videos will play, but some restrict iframe embedding.
            title.innerText = 'YouTube';
        } else if(appType === 'appstore') {
            frame.src = 'https://appstore.com'; // Will show placeholder, Apple blocks iframes
            title.innerText = 'App Store';
        }
    }

    function openDialer() {
        document.getElementById('appWindow').style.display = 'flex';
        document.getElementById('appFrame').style.display = 'none';
        document.getElementById('dialerUI').style.display = 'flex';
        document.getElementById('appTitle').innerText = 'Phone';
        document.getElementById('dialerDisplay').innerText = '';
    }

    function addNumber(num) {
        let display = document.getElementById('dialerDisplay');
        if (display.innerText.length < 15) {
            display.innerText += num;
        }
    }

    function closeApp() {
        document.getElementById('appWindow').style.display = 'none';
        document.getElementById('appFrame').src = '';
    }
</script>
</body>
</html>
