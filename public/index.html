<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIP Proxy Phone</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background-color: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        .phone {
            width: 375px; height: 812px; background: #111; border-radius: 40px; border: 6px solid #222;
            position: relative; overflow: hidden; box-shadow: 0 0 30px rgba(0, 255, 255, 0.2);
        }

        .notch {
            position: absolute; top: 0; left: 50%; transform: translateX(-50%);
            width: 130px; height: 25px; background: #000; border-radius: 0 0 15px 15px; z-index: 100;
        }

        .home-screen { padding: 50px 20px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        
        .app-icon { color: white; font-size: 11px; text-align: center; cursor: pointer; }
        .app-icon img { width: 50px; height: 50px; border-radius: 12px; margin-bottom: 5px; }

        .app-window {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; z-index: 50; display: none; flex-direction: column;
        }

        .browser-header {
            padding: 30px 10px 10px 10px; background: #f1f1f1; display: flex; gap: 10px; align-items: center;
        }
        .browser-header input {
            flex-grow: 1; padding: 8px; border-radius: 15px; border: 1px solid #ccc; outline: none;
        }
        .close-btn { color: #007aff; cursor: pointer; font-weight: bold; padding: 0 5px; }
        
        iframe { flex-grow: 1; border: none; width: 100%; background: #fff; }
    </style>
</head>
<body>

<div class="phone">
    <div class="notch"></div>
    
    <div class="home-screen" id="homeScreen">
        <div class="app-icon" onclick="openBrowser()">
            <img src="https://img.icons8.com/color/96/google-chrome.png" alt="Browser">
            Google
        </div>
    </div>

    <div class="app-window" id="appWindow">
        <div class="browser-header">
            <div class="close-btn" onclick="closeApp()">Back</div>
            <input type="text" id="urlInput" placeholder="Search Google or enter URL" onkeypress="handleEnter(event)">
            <div class="close-btn" onclick="searchUrl()">Go</div>
        </div>
        <iframe id="appFrame" src=""></iframe>
    </div>
</div>

<script>
    function openBrowser() {
        document.getElementById('appWindow').style.display = 'flex';
        document.getElementById('urlInput').value = 'https://www.google.com';
        searchUrl(); // Auto load Google on open
    }

    function searchUrl() {
        let input = document.getElementById('urlInput').value;
        if(input.trim() === '') return;
        
        // Agar user direct "Salman Khan" search kare, to Google search ban jaye
        if(!input.includes('.') && !input.startsWith('http')) {
            input = 'https://www.google.com/search?q=' + encodeURIComponent(input);
        }

        // Yahan magic ho raha hai! Hum real URL ko apne Node.js Proxy se bhej rahe hain.
        // Proxy uski restrictions hata dega aur iframe me display karega.
        const proxyUrl = `/proxy?url=${encodeURIComponent(input)}`;
        document.getElementById('appFrame').src = proxyUrl;
    }

    function handleEnter(e) {
        if (e.key === 'Enter') {
            searchUrl();
        }
    }

    function closeApp() {
        document.getElementById('appWindow').style.display = 'none';
        document.getElementById('appFrame').src = '';
    }
</script>
</body>
</html>
