<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>100% Working Virtual Phone OS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background-color: #0a0a0a; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        
        .phone {
            width: 375px; height: 812px; background: #111;
            border-radius: 45px; border: 8px solid #222; position: relative;
            box-shadow: 0 0 50px rgba(191, 85, 236, 0.3); overflow: hidden;
        }

        .notch {
            position: absolute; top: 0; left: 50%; transform: translateX(-50%);
            width: 150px; height: 28px; background: #000;
            border-bottom-left-radius: 18px; border-bottom-right-radius: 18px; z-index: 100;
        }

        .home-screen {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px 15px;
            padding: 70px 20px 20px 20px; height: calc(100% - 95px);
            background: linear-gradient(180deg, #0f172a, #020617);
        }

        .app-icon {
            display: flex; flex-direction: column; align-items: center; color: white; font-size: 11px; cursor: pointer;
        }
        .app-icon img {
            width: 55px; height: 55px; border-radius: 12px; margin-bottom: 5px;
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* Full Browser/App Window */
        .app-window {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; z-index: 90; display: none; flex-direction: column;
        }
        
        /* Custom Browser Top Bar */
        .browser-bar {
            padding: 35px 10px 10px 10px; background: #1e293b; display: flex; gap: 8px; align-items: center;
        }
        .browser-bar input {
            flex-grow: 1; padding: 6px 12px; border-radius: 20px; border: none; outline: none; font-size: 13px;
        }
        .browser-bar button {
            background: #3b82f6; color: white; border: none; padding: 6px 12px; border-radius: 15px; cursor: pointer; font-size: 12px;
        }
        .back-home-btn { background: #ef4444 !important; }

        iframe { flex-grow: 1; border: none; width: 100%; height: 100%; background: white; }

        /* Store UI */
        .store-container { padding: 20px; background: #0f172a; color: white; height: 100%; overflow-y: auto; }
        .store-card {
            background: #1e293b; padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;
        }
        .store-card button { background: #10b981; color: white; border: none; padding: 6px 15px; border-radius: 20px; font-weight: bold; cursor: pointer; }

        .dock {
            position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%);
            width: 90%; height: 75px; background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px); border-radius: 25px;
            display: flex; justify-content: space-around; align-items: center;
        }
    </style>
</head>
<body>

<div class="phone">
    <div class="notch"></div>
    
    <div class="home-screen" id="homeScreen">
        </div>

    <div class="dock">
        <div class="app-icon" onclick="openBrowserApp()">
            <img src="https://img.icons8.com/color/96/000000/safari--v1.png" alt="Browser">
        </div>
        <div class="app-icon" onclick="openStoreApp()">
            <img src="https://img.icons8.com/color/96/000000/mac-os--v1.png" alt="Store">
        </div>
    </div>

    <div class="app-window" id="appWindow">
        <div class="browser-bar">
            <button class="back-home-btn" onclick="closeApp()">Exit</button>
            <input type="text" id="webAddressInput" placeholder="Enter URL (e.g. https://google.com)">
            <button onclick="launchProxyNav()">Go</button>
        </div>
        
        <iframe id="phoneIframe" src=""></iframe>
        
        <div class="store-container" id="virtualStore" style="display: none;">
            <h2>Cloud App Store (512MB)</h2><br>
            <div class="store-card">
                <div>
                    <h4>Google Search Engine</h4>
                    <p style="font-size: 11px; color: #94a3b8;">Real Working Search</p>
                </div>
                <button onclick="triggerInstall('google', 'Google', 'https://img.icons8.com/color/96/google-logo.png', 'https://google.com')">Install</button>
            </div>
            <div class="store-card">
                <div>
                    <h4>YouTube Proxy</h4>
                    <p style="font-size: 11px; color: #94a3b8;">Watch Videos Internally</p>
                </div>
                <button onclick="triggerInstall('youtube', 'YouTube', 'https://img.icons8.com/color/96/youtube-play.png', 'https://www.youtube.com')">Install</button>
            </div>
        </div>
    </div>
</div>

<script>
    async function fetchApps() {
        const res = await fetch('/get_apps');
        const data = await res.json();
        const screen = document.getElementById('homeScreen');
        screen.innerHTML = '';
        
        data.forEach(app => {
            screen.innerHTML += `
                <div class="app-icon" onclick="runAppInline('${app.url}')">
                    <img src="${app.icon}">
                    <span>${app.name}</span>
                </div>
            `;
        });
    }

    function openBrowserApp() {
        document.getElementById('appWindow').style.display = 'flex';
        document.getElementById('virtualStore').style.display = 'none';
        document.getElementById('phoneIframe').style.display = 'block';
        document.getElementById('webAddressInput').value = 'https://google.com';
        launchProxyNav();
    }

    function openStoreApp() {
        document.getElementById('appWindow').style.display = 'flex';
        document.getElementById('phoneIframe').style.display = 'none';
        document.getElementById('virtualStore').style.display = 'block';
    }

    function launchProxyNav() {
        let url = document.getElementById('webAddressInput').value;
        if(!url.startsWith('http://') && !url.startsWith('https://')){
            url = 'https://' + url;
        }
        // Routing via server proxy to secure bypass
        document.getElementById('phoneIframe').src = `/proxy?url=${encodeURIComponent(url)}`;
    }

    function runAppInline(url) {
        document.getElementById('appWindow').style.display = 'flex';
        document.getElementById('virtualStore').style.display = 'none';
        document.getElementById('phoneIframe').style.display = 'block';
        document.getElementById('webAddressInput').value = url;
        launchProxyNav();
    }

    async function triggerInstall(id, name, icon, url) {
        const res = await fetch('/install', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({id, name, icon, url})
        });
        const status = await res.json();
        alert(status.message);
        fetchApps();
    }

    function closeApp() {
        document.getElementById('appWindow').style.display = 'none';
        document.getElementById('phoneIframe').src = '';
    }

    // Startup
    fetchApps();
</script>
</body>
</html>
